# Grafana on its own host (internal alias). Caddy owns the public domain and
# rewrites Host to this alias:
#   grafana.<domain> { reverse_proxy localhost:8080 { header_up Host grafana.internal } }
# Grafana has its own login, gated by GRAFANA_ADMIN_PASSWORD (in the Secret).
# Prometheus is intentionally NOT exposed (no auth) — port-forward when needed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: shopnexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: grafana.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
