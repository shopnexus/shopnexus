# Grafana — dashboards over the Prometheus datasource (auto-provisioned from the
# `grafana-datasources` ConfigMap, see grafana/provisioning/). Single replica /
# one PVC (Recreate) holding its SQLite state; fsGroup 472 (the grafana user) so
# the local-path PVC is writable.
#
# Admin password: optional key GRAFANA_ADMIN_PASSWORD in shopnexus-secret. If the
# key is absent the pod still starts and Grafana falls back to admin/admin (fine
# behind port-forward; add the key to lock it down). Access is via port-forward —
# see deploy/README.md "Day-to-day".
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: shopnexus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: shopnexus
    spec:
      securityContext:
        fsGroup: 472   # grafana user — owns the mounted PVC
      containers:
        - name: grafana
          image: grafana/grafana:11.3.1   # bump as needed
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnexus-secret
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true   # absent ⇒ Grafana default admin/admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # Public origin (Caddy edge). Grafana builds absolute links/redirects
            # from this; must match the domain the ingress serves.
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.toanehihi.io.vn
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources   # kustomize rewrites to the hashed name
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
