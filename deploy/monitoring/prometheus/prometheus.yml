# Prometheus scrape config (in-cluster). Mounted at /etc/prometheus/prometheus.yml
# via the `prometheus-config` ConfigMap (kustomize configMapGenerator, hashed name
# ⇒ a config edit rolls the pod). Static targets by in-cluster DNS — no k8s
# service-discovery, so Prometheus needs no RBAC/ServiceAccount.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: shopnexus

scrape_configs:
  # Go backend — /metrics on its HTTP port (Echo, baked default port 5005). Same
  # namespace as Prometheus, so the Service short name `server` resolves.
  - job_name: shopnexus-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:5005
        labels:
          service: shopnexus-server
          env: production

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
