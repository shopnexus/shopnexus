# Mintlify docs, exported to a static site (`mint export`) and served by nginx.
# Exposed on its OWN host port (5000) at root — the export uses root-absolute
# asset paths (/_next, /api...) so it can't share the / + /api host with the
# app. Service is NodePort 30500; k3d maps host 5000 -> node 30500:
#   k3d cluster edit main --port-add '5000:30500@server:0'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: docs
    app.kubernetes.io/part-of: shopnexus
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docs
        app.kubernetes.io/part-of: shopnexus
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: docs
          image: ghcr.io/shopnexus/docs:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: docs
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: docs
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30500
