# Mintlify docs, exported to a static site (`mint export`) and served by nginx.
# Served on its OWN subdomain via the ingress — the export uses root-absolute
# asset paths (/_next, /api...) so it needs a host to itself, but a subdomain
# keeps it a normal ingress citizen (no bespoke NodePort/host port). Caddy owns
# the public domain and rewrites Host to the internal alias `docs.internal` that
# the docs Ingress matches (see ingress.yaml):
#   docs.<domain> { reverse_proxy localhost:8080 { header_up Host docs.internal } }
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: docs
    app.kubernetes.io/part-of: shopnexus
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docs
        app.kubernetes.io/part-of: shopnexus
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: docs
          image: ghcr.io/shopnexus/docs:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: docs
spec:
  selector:
    app.kubernetes.io/name: docs
  ports:
    - port: 80
      targetPort: 80
