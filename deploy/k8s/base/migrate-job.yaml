# DB bootstrap: runs `/app/migrate` (embedded migrations) before the app rolls
# out. As an Argo CD PreSync hook it runs on every sync, before server/website
# are updated; migrations are idempotent (golang-migrate tracks applied versions
# per module in schema_migrations_<module>).
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/part-of: shopnexus
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: migrate
          image: ghcr.io/shopnexus/server:main
          imagePullPolicy: Always
          command: ["/app/migrate"]
          # PreSync hook runs before the generated ConfigMap exists, so the
          # Postgres connection is set explicitly here; only the (out-of-band)
          # Secret is referenced. migrate needs just the DB connection.
          env:
            - name: APP_POSTGRES_HOST
              value: postgres
            - name: APP_POSTGRES_PORT
              value: "5432"
            - name: APP_POSTGRES_USERNAME
              value: shopnexus
            - name: APP_POSTGRES_DATABASE
              value: shopnexus
            - name: APP_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnexus-secret
                  key: APP_POSTGRES_PASSWORD
