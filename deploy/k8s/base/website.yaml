# Next.js frontend (standalone output). Listens on 3000.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # after DB migration (wave 1)
  labels:
    app.kubernetes.io/name: website
    app.kubernetes.io/part-of: shopnexus
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: website
        app.kubernetes.io/part-of: shopnexus
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: website
          image: ghcr.io/shopnexus/website:main
          imagePullPolicy: Always
          # NEXT_PUBLIC_API_URL / NEXT_PUBLIC_SITE_URL are inlined at BUILD time
          # (baked by the website CI build-args), not set here at runtime.
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            # Public origin for server-side SEO/canonical (runtime, from the
            # generated ConfigMap — change domain without rebuilding the image).
            - name: SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: shopnexus-config
                  key: SITE_URL
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: website
spec:
  selector:
    app.kubernetes.io/name: website
  ports:
    - port: 3000
      targetPort: 3000
