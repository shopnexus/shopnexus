# TEMPLATE ONLY — do not commit real secrets.
#
# Create the real Secret out-of-band (it is git-ignored / never in the repo):
#
#   kubectl -n shopnexus create secret generic shopnexus-secret \
#     --from-literal=POSTGRES_PASSWORD='<pg-pass>' \
#     --from-literal=REDIS_PASSWORD='<redis-pass>' \
#     --from-literal=APP_POSTGRES_PASSWORD='<pg-pass>' \
#     --from-literal=APP_REDIS_PASSWORD='<redis-pass>'
#
# POSTGRES_PASSWORD / REDIS_PASSWORD configure the postgres/redis containers;
# APP_POSTGRES_PASSWORD / APP_REDIS_PASSWORD tell the server how to connect
# (they must match). Keeping both explicit avoids surprises.
apiVersion: v1
kind: Secret
metadata:
  name: shopnexus-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
  APP_POSTGRES_PASSWORD: "CHANGE_ME"
  APP_REDIS_PASSWORD: "CHANGE_ME"
