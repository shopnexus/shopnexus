# TEMPLATE ONLY — do not commit real secrets.
#
# Create the real Secret out-of-band (it is git-ignored / never in the repo):
#
#   kubectl -n shopnexus create secret generic shopnexus-secret \
#     --from-literal=APP_POSTGRES_PASSWORD='<pg-pass>' \
#     --from-literal=APP_REDIS_PASSWORD='<redis-pass>' \
#     --from-literal=APP_JWT_SECRET='<jwt-signing-secret>' \
#     --from-literal=APP_EXCHANGE_APIKEY='<exchange-rate-api-key>' \
#     --from-literal=APP_VNPAY_TMNCODE='<vnpay-tmn-code>' \
#     --from-literal=APP_VNPAY_HASHSECRET='<vnpay-hash-secret>'
#
# One value per secret. The postgres/redis containers read APP_POSTGRES_PASSWORD
# / APP_REDIS_PASSWORD directly — their image env names (POSTGRES_PASSWORD /
# REDIS_PASSWORD) are mapped from these keys in postgres.yaml / redis.yaml, so
# there is no duplicate value to keep in sync.
apiVersion: v1
kind: Secret
metadata:
  name: shopnexus-secret
type: Opaque
stringData:
  APP_POSTGRES_PASSWORD: "CHANGE_ME"
  APP_REDIS_PASSWORD: "CHANGE_ME"
  APP_JWT_SECRET: "CHANGE_ME"
  APP_EXCHANGE_APIKEY: "CHANGE_ME"
  APP_VNPAY_TMNCODE: "CHANGE_ME"
  APP_VNPAY_HASHSECRET: "CHANGE_ME"
