# Traefik ingress. Every host here is a STABLE INTERNAL ALIAS (`*.internal`),
# NOT a public domain — Caddy owns the public domains and rewrites the upstream
# Host to these aliases, so a domain change never touches these manifests:
#   shop.<domain>    { reverse_proxy localhost:8080 { header_up Host main.internal } }
#   docs.<domain>    { reverse_proxy localhost:8080 { header_up Host docs.internal } }
#
# main.internal = the storefront: /api -> server (so the website's same-origin
# /api/v1 calls work), / -> website. The API is NOT on a separate subdomain —
# first-party browser calls stay same-origin (no CORS).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopnexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: main.internal
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 5005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 3000
---
# Docs on its own host (docs.internal). Its export uses root-absolute asset paths
# so it needs a dedicated host rather than a path on the app.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopnexus-docs
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: docs.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80
